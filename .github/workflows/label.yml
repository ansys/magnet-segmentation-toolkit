name: Labeler

on:
  pull_request:
      # opened, reopened, and synchronize are default for pull_request
      # edited - when PR title or body is changed
      # labeled - when labels are added to PR
      types: [opened, reopened, synchronize, edited, labeled]
  push:
    branches: [ main ]
    paths:
      - '../labels.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {} # Disable default permissions

jobs:

  label-syncer:
    name: Syncer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c # v1.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  labeler:
    name: Set labels
    needs: [label-syncer]
    permissions:
      contents: read
      pull-requests: write # Needed to add existing labels to PRs
    runs-on: ubuntu-latest
    steps:

    # Label based on modified files
    - name: Label based on changed files
      uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"

    # Label based on branch name
    - name: Label docs
      if: startsWith(github.event.pull_request.head.ref, 'docs')
      run: gh pr edit "$PR_NUMBER" --add-label "documentation" --repo ansys/magnet-segmentation-toolkit

    - name: Label maintenance
      if: |
        startsWith(github.event.pull_request.head.ref, 'maint') ||
        startsWith(github.event.pull_request.head.ref, 'ci')
      run: gh pr edit "$PR_NUMBER" --add-label "maintenance" --repo ansys/magnet-segmentation-toolkit

    - name: Label enhancement
      if: startsWith(github.event.pull_request.head.ref, 'feat')
      run: gh pr edit "$PR_NUMBER" --add-label "enhancement" --repo ansys/magnet-segmentation-toolkit

    - name: Label bug
      if: startsWith(github.event.pull_request.head.ref, 'fix')
      run: gh pr edit "$PR_NUMBER" --add-label "bug" --repo ansys/magnet-segmentation-toolkit

    - name: Label testing
      if: startsWith(github.event.pull_request.head.ref, 'test')
      run: gh pr edit "$PR_NUMBER" --add-label "testing" --repo ansys/magnet-segmentation-toolkit

  commenter:
    name: Suggest labels if none assigned
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Needed to create deployment comments on PRs
    steps:
    - name: Suggest to add labels
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      # Execute only when no labels have been applied to the pull request
      if: toJSON(github.event.pull_request.labels.*.name) == '{}'
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          Please add one of the following labels to add this contribution to the Release Notes :point_down:
          - [bug](https://github.com/ansys/magnet-segmentation-toolkit/pulls?q=label%3Abug+)
          - [documentation](https://github.com/ansys/magnet-segmentation-toolkit/pulls?q=label%3Adocumentation+)
          - [enhancement](https://github.com/ansys/magnet-segmentation-toolkit/pulls?q=label%3Aenhancement+)
          - [good first issue](https://github.com/ansys/magnet-segmentation-toolkit/pulls?q=label%3Agood+first+issue)
          - [maintenance](https://github.com/ansys/magnet-segmentation-toolkit/pulls?q=label%3Amaintenance+)
          - [release](https://github.com/ansys/magnet-segmentation-toolkit/pulls?q=label%3Arelease+)


  changelog-fragment:
    name: "Create changelog fragment"
    needs: [labeler]
    permissions:
      contents: write # Needed to create changelog fragment on PR
      pull-requests: write # Needed to create changelog fragment on PR
    runs-on: ubuntu-latest
    steps:
    - uses: ansys/actions/doc-changelog@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
      with:
        token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        use-conventional-commits: true
        use-default-towncrier-config: true
        bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
        bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
